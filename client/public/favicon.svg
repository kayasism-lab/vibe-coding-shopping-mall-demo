<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="달빛공방">
  <defs>
    <linearGradient id="moon" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7ecff"/>
      <stop offset="0.45" stop-color="#e4c4f0"/>
      <stop offset="1" stop-color="#c49fd8"/>
    </linearGradient>
    <radialGradient id="heart" cx="32" cy="32" r="12" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff8fc"/>
      <stop offset="1" stop-color="#f0d0e8"/>
    </radialGradient>
  </defs>
  <!-- 부드러운 밤빛 배경(탭에서 꽃이 돋보이도록) -->
  <circle cx="32" cy="32" r="30" fill="url(#moon)"/>
  <!-- 5장의 꽃잎 -->
  <g fill="#d9a8e0" opacity="0.95" transform="translate(32 32)">
    <ellipse rx="10" ry="18" transform="rotate(-90) translate(0 -7)"/>
    <ellipse rx="10" ry="18" transform="rotate(-18) translate(0 -7)"/>
    <ellipse rx="10" ry="18" transform="rotate(54) translate(0 -7)"/>
    <ellipse rx="10" ry="18" transform="rotate(126) translate(0 -7)"/>
    <ellipse rx="10" ry="18" transform="rotate(198) translate(0 -7)"/>
  </g>
  <!-- 중심 -->
  <circle cx="32" cy="32" r="11" fill="url(#heart)"/>
  <circle cx="32" cy="32" r="6" fill="#e8b4d4" opacity="0.85"/>
</svg>
